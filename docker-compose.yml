version: "3.8"

services:
  # ========== Infrastructure ==========
  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: doctorapp_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports: ["5432:5432"]
    volumes: [pg-auth:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-doctor:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: doctorapp_doctor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports: ["5433:5432"]
    volumes: [pg-doctor:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-appointment:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: doctorapp_appointment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports: ["5434:5432"]
    volumes: [pg-appointment:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-notification:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: doctorapp_notification
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports: ["5435:5432"]
    volumes: [pg-notification:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports: ["2181:2181"]

  kafka:
    image: confluentinc/cp-kafka:7.6
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  zipkin:
    image: openzipkin/zipkin:3
    ports: ["9411:9411"]

  # ========== Microservices ==========
  service-registry:
    build:
      context: .
      dockerfile: Dockerfile.service-registry
    ports: ["8761:8761"]
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.api-gateway
    ports: ["8080:8080"]
    environment:
      EUREKA_HOST: service-registry
    depends_on:
      service-registry: { condition: service_healthy }

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.auth-service
    ports: ["8081:8081"]
    environment:
      DB_HOST: postgres-auth
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      EUREKA_HOST: service-registry
      JWT_SECRET: ${JWT_SECRET:-my_very_long_random_secure_key_for_healthconnect_pune_2026_top_secret}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    depends_on:
      postgres-auth: { condition: service_healthy }
      redis: { condition: service_healthy }
      service-registry: { condition: service_healthy }

  doctor-service:
    build:
      context: .
      dockerfile: Dockerfile.doctor-service
    ports: ["8082:8082"]
    environment:
      DB_HOST: postgres-doctor
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      KAFKA_HOST: kafka
      EUREKA_HOST: service-registry
      JWT_SECRET: ${JWT_SECRET:-my_very_long_random_secure_key_for_healthconnect_pune_2026_top_secret}
    depends_on:
      postgres-doctor: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
      service-registry: { condition: service_healthy }

  appointment-service:
    build:
      context: .
      dockerfile: Dockerfile.appointment-service
    ports: ["8083:8083"]
    environment:
      DB_HOST: postgres-appointment
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      KAFKA_HOST: kafka
      EUREKA_HOST: service-registry
      JWT_SECRET: ${JWT_SECRET:-my_very_long_random_secure_key_for_healthconnect_pune_2026_top_secret}
    depends_on:
      postgres-appointment: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
      service-registry: { condition: service_healthy }

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.notification-service
    ports: ["8084:8084"]
    environment:
      DB_HOST: postgres-notification
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      KAFKA_HOST: kafka
      EUREKA_HOST: service-registry
      JWT_SECRET: ${JWT_SECRET:-my_very_long_random_secure_key_for_healthconnect_pune_2026_top_secret}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    depends_on:
      postgres-notification: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
      service-registry: { condition: service_healthy }

volumes:
  pg-auth:
  pg-doctor:
  pg-appointment:
  pg-notification:
